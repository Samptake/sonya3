<!DOCTYPE html>
<html>
<head>
    <title>Соня, не нажимай!</title>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }
        .button {
            background: #ff3366;
            color: white;
            font-size: 2em;
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff3366;
            transition: 0.3s;
        }
        .button:hover {
            transform: scale(1.1);
            background: #ff1493;
        }
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .heart {
            position: absolute;
            font-size: 30px;
            animation: float 2s ease-out forwards;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <button class="button" onclick="explodeHearts()">НЕ НАЖИМАЙ</button>
    <div class="hearts" id="hearts"></div>

    <script>
        function explodeHearts() {
            for(let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = ['❤️','💗','💓','💕','💖','💘','💝'][Math.floor(Math.random() * 7)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 0.5 + 's';
                    heart.style.fontSize = (20 + Math.random() * 40) + 'px';
                    document.getElementById('hearts').appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 2000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
